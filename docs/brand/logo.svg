<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AGenNext Chat">
  <title>AGenNext Chat — Own the loop</title>
  <!-- The gate: a squircle boundary -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="#4338CA"/>
  <!-- The loop: a bounded cycle with a gap, round-capped -->
  <path d="M 39.5 19.0 A 15 15 0 1 1 24.5 19.0"
        stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Arrowhead at the loop's end, implying the cycle's direction -->
  <path d="M 24.5 19.0 L 21.2 15.2 L 27.0 14.0 Z" fill="#22C3D6"/>
  <!-- The agent / contract: the central node -->
  <circle cx="32" cy="32" r="5.5" fill="#22C3D6"/>
</svg>
