<svg width="880" height="520" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="880" height="520" fill="#F7F6FB"/>

  <!-- Header: logo + title -->
  <g transform="translate(32,28)">
    <rect x="0" y="0" width="40" height="40" rx="11" fill="#4338CA"/>
    <path d="M 30.0 13.4 A 10.5 10.5 0 1 1 17.5 13.4" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M 17.5 13.4 L 15.2 10.7 L 19.2 9.9 Z" fill="#22C3D6"/>
    <circle cx="20" cy="20" r="3.8" fill="#22C3D6"/>
    <text x="54" y="19" font-size="20" font-weight="700" fill="#15132A">AGenNext Chat</text>
    <text x="54" y="37" font-size="13" fill="#6A6982">Design System — Own the loop</text>
  </g>

  <!-- Color swatches -->
  <text x="32" y="100" font-size="13" font-weight="600" fill="#6A6982">COLOR</text>
  <g transform="translate(32,112)" font-size="11" fill="#15132A">
    <g><rect width="100" height="52" rx="10" fill="#4338CA"/><text x="0" y="66" font-weight="600">Primary</text><text x="0" y="80" fill="#6A6982" font-family="JetBrains Mono, monospace">#4338CA</text></g>
    <g transform="translate(116,0)"><rect width="100" height="52" rx="10" fill="#22C3D6"/><text x="0" y="66" font-weight="600">Accent</text><text x="0" y="80" fill="#6A6982" font-family="JetBrains Mono, monospace">#22C3D6</text></g>
    <g transform="translate(232,0)"><rect width="100" height="52" rx="10" fill="#15132A"/><text x="0" y="66" font-weight="600">Ink</text><text x="0" y="80" fill="#6A6982" font-family="JetBrains Mono, monospace">#15132A</text></g>
    <g transform="translate(348,0)"><rect width="100" height="52" rx="10" fill="#FFFFFF" stroke="#D8D6E4"/><text x="0" y="66" font-weight="600">Surface</text><text x="0" y="80" fill="#6A6982" font-family="JetBrains Mono, monospace">#FFFFFF</text></g>
    <g transform="translate(464,0)"><rect width="100" height="52" rx="10" fill="#DA2A55"/><text x="0" y="66" font-weight="600">Danger</text><text x="0" y="80" fill="#6A6982" font-family="JetBrains Mono, monospace">#DA2A55</text></g>
    <g transform="translate(580,0)"><rect width="100" height="52" rx="10" fill="#0FA577"/><text x="0" y="66" font-weight="600">Success</text><text x="0" y="80" fill="#6A6982" font-family="JetBrains Mono, monospace">#0FA577</text></g>
    <g transform="translate(696,0)"><rect width="100" height="52" rx="10" fill="#E6960F"/><text x="0" y="66" font-weight="600">Warning</text><text x="0" y="80" fill="#6A6982" font-family="JetBrains Mono, monospace">#E6960F</text></g>
  </g>

  <!-- Typography -->
  <text x="32" y="248" font-size="13" font-weight="600" fill="#6A6982">TYPE</text>
  <text x="32" y="288" font-size="36" font-weight="700" fill="#15132A">Own the loop.</text>
  <text x="32" y="312" font-size="15" fill="#3A3852">Inter for UI — calm, exact, accountable.</text>
  <text x="32" y="332" font-size="13" fill="#3A3852" font-family="JetBrains Mono, monospace">JetBrains Mono — rag.retrieve · trace · contracts</text>

  <!-- Components: button + chat bubble -->
  <text x="480" y="248" font-size="13" font-weight="600" fill="#6A6982">COMPONENTS</text>
  <g transform="translate(480,266)">
    <rect width="92" height="38" rx="10" fill="#4338CA"/>
    <text x="46" y="24" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Send</text>
    <rect x="104" width="92" height="38" rx="10" fill="#FFFFFF" stroke="#D8D6E4"/>
    <text x="150" y="24" font-size="14" font-weight="600" fill="#15132A" text-anchor="middle">Trace</text>
  </g>
  <g transform="translate(480,320)">
    <rect width="368" height="52" rx="14" fill="#FFFFFF" stroke="#D8D6E4"/>
    <circle cx="22" cy="26" r="6" fill="#22C3D6"/>
    <text x="40" y="23" font-size="13" fill="#15132A">Returns are accepted within 30 days of</text>
    <text x="40" y="40" font-size="13" fill="#15132A">delivery with proof of purchase.</text>
  </g>

  <!-- Trace chips -->
  <text x="32" y="412" font-size="13" font-weight="600" fill="#6A6982">TRACE (inspectable — no hidden logic)</text>
  <g transform="translate(32,424)" font-size="12" font-weight="600">
    <g><rect width="84" height="30" rx="15" fill="#3A3852"/><text x="42" y="20" fill="#FFFFFF" text-anchor="middle">reason</text></g>
    <g transform="translate(96,0)"><rect width="100" height="30" rx="15" fill="#0FA577"/><text x="50" y="20" fill="#FFFFFF" text-anchor="middle">guard ✓</text></g>
    <g transform="translate(208,0)"><rect width="70" height="30" rx="15" fill="#4338CA"/><text x="35" y="20" fill="#FFFFFF" text-anchor="middle">act</text></g>
    <g transform="translate(290,0)"><rect width="96" height="30" rx="15" fill="#DA2A55"/><text x="48" y="20" fill="#FFFFFF" text-anchor="middle">screen ⛉</text></g>
    <g transform="translate(398,0)"><rect width="92" height="30" rx="15" fill="#22C3D6"/><text x="46" y="20" fill="#15132A" text-anchor="middle">observe</text></g>
    <g transform="translate(502,0)"><rect width="76" height="30" rx="15" fill="#3A3852"/><text x="38" y="20" fill="#FFFFFF" text-anchor="middle">exit</text></g>
  </g>
