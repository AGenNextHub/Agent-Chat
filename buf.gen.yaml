# buf codegen config. NOT run yet: generating Go bindings introduces the
# google.golang.org/protobuf (and grpc) runtime dependency, which ends the
# zero-third-party-dependency property of the core. That adoption is gated by
# docs/adr/0004-protobuf-first-contracts.md (supply-chain check + release gate).
version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: gen
    opt: paths=source_relative
