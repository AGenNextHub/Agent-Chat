# Default values for agennext-chat.

image:
  repository: ghcr.io/agennext/agent-chat
  # Pin to an immutable digest in production (see SUPPLY_CHAIN.md).
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 3  # stateless workers; >1 so there is no single node for failure

# High availability: spread replicas across nodes, keep a minimum available
# during voluntary disruptions, and never drop below capacity on rollout.
podDisruptionBudget:
  enabled: true
  minAvailable: 2

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# Default: prefer spreading across nodes; require if you have the capacity.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector: {}   # filled with selector labels by the template

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

service:
  type: ClusterIP
  port: 8080

# Hardened pod defaults: nonroot, read-only rootfs, no privilege escalation.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

serviceAccount:
  create: true
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}
