# Capability CRD — the capability IS the contract. Spec mirrors, field for field,
# the proto Contract (proto/agennext/v1/capability.proto) and the Go type
# (pkg/capability/Contract): one contract model, three coherent expressions.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: capabilities.agennext.io
  labels:
    app.kubernetes.io/part-of: agennext-chat
spec:
  group: agennext.io
  scope: Namespaced
  names:
    kind: Capability
    plural: capabilities
    singular: capability
    shortNames: ["cap"]
  versions:
    - name: v1alpha1   # maps to the proto agennext.v1 contract; stabilizes together
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["version", "provides", "sandbox"]
              properties:
                version:
                  type: string
                  description: Semantic version (major.minor.patch).
                  pattern: '^\d+\.\d+\.\d+$'
                provides:
                  type: array
                  minItems: 1
                  items: {type: string}
                requires:
                  type: array
                  items: {type: string}
                scope:
                  type: object
                  description: Least-privilege authority ("*" = any).
                  properties:
                    tenants: {type: array, items: {type: string}}
                    data: {type: array, items: {type: string}}
                    tools: {type: array, items: {type: string}}
                policy:
                  type: string
                  description: OPA bundle reference.
                authz:
                  type: string
                  description: OpenFGA relation reference.
                artifact:
                  type: string
                  description: Digest-pinned OCI reference.
                sandbox:
                  type: string
                  enum: ["Isolated", "Restricted", "Trusted"]
                  default: "Isolated"
                idempotent:
                  type: boolean
                  default: false
            status:
              type: object
              properties:
                admitted: {type: boolean}
                observedGeneration: {type: integer}
                conditions:
                  type: array
                  items:
                    type: object
                    required: ["type", "status"]
                    properties:
                      type: {type: string}
                      status: {type: string, enum: ["True", "False", "Unknown"]}
                      reason: {type: string}
                      message: {type: string}
                      lastTransitionTime: {type: string, format: date-time}
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Sandbox
          type: string
          jsonPath: .spec.sandbox
        - name: Admitted
          type: boolean
          jsonPath: .status.admitted
